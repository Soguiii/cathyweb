<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Album — Until Then, Cathy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="design.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-overlay"></div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm">
        <div class="container">
            <a class="navbar-brand" href="home.html">CathyWeb</a>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="About.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="album.html">Album</a></li>
                <li class="nav-item"><a class="nav-link" href="index.html">Mood</a></li>
            </ul>
        </div>
    </nav>

    <!-- PAGE HEADER -->
    <div class="container mt-5">
        <div class="text-center mb-5">
            <div class="home-badge mb-3">Memories</div>
            <h2 class="home-title">Cathy's <span class="home-name">Album</span></h2>
            <p class="home-tagline">A collection of her moments, kept here with love.</p>
        </div>

        <!-- PHOTO GRID -->
        <div class="row g-4 mb-5" id="photoGrid">
            <!-- Cards will be dynamically injected here by script.js -->
        </div>
    </div>

    <!-- PHOTO MODAL -->
    <div class="modal fade" id="photoModal" tabindex="-1" aria-labelledby="photoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content custom-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="photoModalLabel">Photo Title</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImage" src="" alt="Full Photo" class="img-fluid rounded mb-3" style="max-height: 60vh; object-fit: contain; width: 100%;">
                    <p id="modalDescription" class="modal-desc">Lorem ipsum dolor sit amet...</p>
                    <span id="modalDate" class="modal-date"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        <p>Made with love &hearts; | Until Then, Cathy &mdash; In memory of Cathy Portillo</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
